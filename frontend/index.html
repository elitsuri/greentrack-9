<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>greentrack</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <header class="app-header">
            <div class="container">
                <h1 class="logo">greentrack</h1>
                <nav class="nav" id="nav">
                    <button class="btn btn-secondary" id="loginBtn">Login</button>
                    <button class="btn btn-primary" id="registerBtn">Register</button>
                </nav>
            </div>
        </header>
        <main class="main-content" id="mainContent">
            <section class="hero">
                <h2>greentrack</h2>
                <p>GreenTrack: Environmental impact tracker with carbon footprint analytics</p>
                <button class="btn btn-primary btn-lg" id="getStartedBtn">Get Started</button>
            </section>
        </main>
    </div>
    <div id="modal" class="modal hidden">
        <div class="modal-overlay" id="modalOverlay"></div>
        <div class="modal-content">
            <button class="modal-close" id="modalClose">&times;</button>
            <div id="modalBody"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
